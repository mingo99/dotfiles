set-option -sg escape-time 10
set-option -g focus-events on
set-option -g mouse on

setw -g mode-keys vi
setw -g status-keys vi

set -g history-limit 50000

set -g default-terminal "tmux-256color"
set-option -ga terminal-features ",*256col*:RGB"

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g display-panes-time 2000
set -g display-time 2000
setw -g monitor-activity on
set -g visual-activity off

bind r source-file ~/.config/tmux/tmux.conf \; display 'tmux.conf sourced'
bind c new-window -c "#{pane_current_path}"
bind C-c new-session

bind -n M-o new-window -c "#{pane_current_path}"
bind -n M-O break-pane
bind -n M-Q kill-pane

unbind n
unbind p
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9
unbind 0
bind -r C-p previous-window
bind -r C-n next-window
bind -n M-u previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind K split-window -vb -c "#{pane_current_path}"
bind J split-window -v -c "#{pane_current_path}"
bind H split-window -hb -c "#{pane_current_path}"
bind L split-window -h -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind 1 select-pane -t:.1
bind 2 select-pane -t:.2
bind 3 select-pane -t:.3
bind 4 select-pane -t:.4
bind 5 select-pane -t:.5
bind 6 select-pane -t:.6
bind 7 select-pane -t:.7
bind 8 select-pane -t:.8
bind 9 select-pane -t:.9
bind 0 select-pane -t:.10
bind > swap-pane -D
bind < swap-pane -U
bind | swap-pane
bind -n M-Space next-layout

bind S choose-tree 'move-pane -v -s "%%"'
bind V choose-tree 'move-pane -h -s "%%"'
bind -n M-! join-pane -t :1
bind -n M-@ join-pane -t :2
bind -n 'M-#' join-pane -t :3
bind -n 'M-$' join-pane -t :4
bind -n M-% join-pane -t :5
bind -n M-^ join-pane -t :6
bind -n M-& join-pane -t :7
bind -n M-* join-pane -t :8
bind -n M-( join-pane -t :9

bind -r C-h resize-pane -L 3
bind -r C-j resize-pane -D 3
bind -r C-k resize-pane -U 3
bind -r C-l resize-pane -R 3

bind X kill-pane

bind -n M-v copy-mode
bind b list-buffers
bind p paste-buffer

bind C-g if-shell '[[ $(tmux showw synchronize-panes | cut -d\  -f2) == "on" ]]' 'setw synchronize-panes off; set -g pane-border-style fg=magenta' 'setw synchronize-panes on; set -g pane-border-style fg=red'
bind t if-shell '[[ $(tmux show -g status | cut -d\  -f2) == "on" ]]' 'set -g status off' 'set -g status on'

set -g status-position bottom
set -g window-status-style none
set -g window-status-current-style none
set -g window-status-activity-style none
set -g window-status-last-style none
# set -g status-bg default
# set -g status-style bg=default

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin "mingo99/tokyonight.tmux"
set -g @tokyo-night-tmux_theme night    # storm | day | default to 'night'
set -g @tokyo-night-tmux_transparent 1  # 1 or 0
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_pane_id_style sub
set -g @tokyo-night-tmux_zoom_id_style super
# Icon styles
set -g @tokyo-night-tmux_terminal_icon 
set -g @tokyo-night-tmux_active_terminal_icon 
set -g @tokyo-night-tmux_window_tidy_icons 1

run '~/.config/tmux/plugins/tpm/tpm'
