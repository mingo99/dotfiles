---
git:
  pagers:
    - pager: delta --dark --paging=never --syntax-theme="tokyonight_moon"
      colorArg: always
  # branchLogCmd: git log --color --graph --pretty=format:'%Cred%h%Creset - %C(bold blue)%an,%Creset %Cgreen%cr%C(yellow)%d%Creset ':' %s' --abbrev-commit {{branchName}} --
gui:
  border: rounded
  showBottomLine: true
  # theme:
  #   activeBorderColor: [cyan, bold]
  #   inactiveBorderColor: [white]
  #   optionsTextColor: [blue]
  #   selectedLineBgColor: [blue]
notARepository: skip # one of: 'prompt' | 'create' | 'skip' | 'quit'
keybinding:
  universal:
    undo: u
    redo: <c-r>
customCommands:
  - key: b
    command: tig blame -- {{.SelectedFile.Name}}
    context: files
    description: blame file at tree
  - key: b
    command: tig blame {{.SelectedSubCommit.Sha}} -- {{.SelectedCommitFile.Name}}
    context: commitFiles
    description: blame file at revision
  - key: B
    command: tig blame -- {{.SelectedCommitFile.Name}}
    context: commitFiles
    description: blame file at tree
